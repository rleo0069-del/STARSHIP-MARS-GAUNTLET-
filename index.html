<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship: Mars Gauntlet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            margin:0; background:#000011; display:flex; justify-content:center; align-items:center; 
            min-height:100vh; font-family: 'Press Start 2P', cursive; color:white; overflow:hidden;
        }
        canvas { border: 6px solid #ff4400; box-shadow: 0 0 50px #ff0000; image-rendering: pixelated; }
        
        .controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 260px;
        }
        button {
            background: rgba(255,60,0,0.7); color: white; border: 3px solid #ff8800;
            font-family: 'Press Start 2P'; padding: 15px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="position:relative;">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div style="position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; font-size:18px; text-shadow: 0 0 10px black;">
            <div>TIME: <span id="timer">:20</span></div>
            <div>SCORE: <span id="score">00000</span></div>
            <div>HIGH: <span id="highscore">00000</span></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,20,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
            <h1 style="font-size:48px; color:#FF0000; margin:0;">STARSHIP</h1>
            <h1 style="font-size:38px; color:#ffaa00; margin:-10px 0 30px;">MARS GAUNTLET</h1>
            <button id="start-btn" style="padding:18px 60px; font-size:24px; background:#cc0000; color:white; border:none; cursor:pointer;">LAUNCH YOUR MISSION</button>
            <div style="margin-top:30px; font-size:14px; line-height:1.5;">
                X ↑ Z ↓ SPACE → Q ←<br>
                Survive <strong>1 minute</strong>
            </div>
        </div>

        <!-- Win / Game Over Screen -->
        <div id="game-over-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(40,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
            <h1 id="game-result" style="font-size:42px;"></h1>
            <p id="final-score" style="font-size:22px; margin:10px 0; line-height:1.6;"></p>
            <button id="restart-btn" style="padding:15px 50px; font-size:20px; background:#aa0000; color:white; border:none; cursor:pointer;">DARE TO LAUNCH AGAIN</button>
        </div>

        <!-- Mobile Controls -->
        <div class="controls" id="mobile-controls" style="display:none;">
            <button id="btn-q">Q ←</button>
            <button id="btn-space">SPACE →</button>
            <button id="btn-x">X ↑</button>
            <button id="btn-z">Z ↓</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let ship = { x: 150, y: 300, width: 52, height: 36 };
        let asteroids = [];
        let particles = [];
        let confetti = [];
        let score = 0, highScore = localStorage.getItem('starshipHigh') || 0;
        let timeLeft = 20;           // ← Changed to 20 seconds
        let gameRunning = false;
        let keys = {};
        let lastSpawn = 0;
        let difficulty = 1;
        let isWin = false;

        document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration, type = 'sawtooth', vol = 0.3) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.value = vol;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                setTimeout(() => osc.stop(), duration);
            } catch(e) {}
        }

        let thrustSound = null;
        function startThrustSound() {
            if (thrustSound) return;
            thrustSound = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            thrustSound.type = 'sawtooth';
            thrustSound.frequency.setValueAtTime(180, audioCtx.currentTime);
            gain.gain.value = 0.15;
            thrustSound.connect(gain).connect(audioCtx.destination);
            thrustSound.start();
        }
        function stopThrustSound() {
            if (thrustSound) { thrustSound.stop(); thrustSound = null; }
        }

        function getPirateRank(score) {
            if (score > 2800) return "LEGENDARY SPACE PIRATE 🏴‍☠️👑";
            if (score > 2200) return "MARS MARAUDER 🏴‍☠️🔥";
            if (score > 1600) return "SPACE BUCCANEER 🏴‍☠️";
            if (score > 1000) return "VOID RAIDER 🏴‍☠️";
            return "ROOKIE SPACE PIRATE 🏴‍☠️";
        }

        function resetGame() {
            ship.x = 150; ship.y = 300;
            asteroids = []; particles = []; confetti = [];
            score = 0; timeLeft = 20; difficulty = 1;
            isWin = false;
            lastSpawn = Date.now();
        }

        function spawnAsteroid() {
            const type = Math.random();
            let size, speed, spin = 0;
            if (type < 0.4) { size = 55; speed = 2.2; }
            else if (type < 0.7) { size = 22; speed = 4.5; }
            else { size = 38; speed = 2.8; spin = (Math.random() - 0.5) * 0.15; }
            asteroids.push({ x: 850, y: Math.random() * 500 + 50, size, speed: speed * difficulty, spin, angle: 0 });
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 35; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 45, color: Math.random()>0.5?'#ff8800':'#ffff00' });
            }
            playSound(120, 600, 'sawtooth', 0.6);
        }

        function createConfetti() {
            for (let i = 0; i < 200; i++) {
                confetti.push({
                    x: Math.random() * 800,
                    y: Math.random() * -300,
                    vx: (Math.random() - 0.5) * 9,
                    vy: Math.random() * 7 + 4,
                    size: Math.random() * 10 + 6,
                    color: ['#ff0000','#00ff00','#ffff00','#00ffff','#ff00ff'][Math.floor(Math.random()*5)],
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 15
                });
            }
        }

        function update() {
            if (!gameRunning) return;

            const speed = 4.8;
            if (keys['KeyX']) ship.y -= speed;
            if (keys['KeyZ']) ship.y += speed;
            if (keys['Space']) ship.x += speed;
            if (keys['KeyQ']) ship.x -= speed;

            ship.x = Math.max(20, Math.min(680, ship.x));
            ship.y = Math.max(40, Math.min(560, ship.y));

            if (keys['Space'] || keys['KeyX'] || keys['KeyZ'] || keys['KeyQ']) startThrustSound();
            else stopThrustSound();

            if (Date.now() - lastSpawn > (620 / difficulty)) {
                spawnAsteroid();
                if (Math.random() < 0.4) spawnAsteroid();
                lastSpawn = Date.now();
            }

            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.x -= a.speed;
                a.angle += a.spin || 0;
                if (a.x < ship.x + ship.width && a.x + a.size > ship.x &&
                    a.y < ship.y + ship.height && a.y + a.size > ship.y) {
                    createExplosion(ship.x + 25, ship.y + 18);
                    endGame();
                    return;
                }
                if (a.x < -80) asteroids.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.96; p.vy *= 0.96;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = confetti.length - 1; i >= 0; i--) {
                const c = confetti[i];
                c.x += c.vx; c.y += c.vy; c.rotation += c.rotSpeed;
                c.vy += 0.18;
                if (c.y > 650) confetti.splice(i, 1);
            }

            timeLeft -= 1/20;
            difficulty = 1 + (20 - timeLeft) / 10;

            if (timeLeft <= 0 && !isWin) { 
                isWin = true;
                winGame(); 
                return; 
            }

            score = Math.floor((20 - timeLeft) * 18);
            document.getElementById('timer').textContent = Math.ceil(timeLeft) + 's';
            document.getElementById('score').textContent = score.toString().padStart(5, '0');
        }

        function draw() {
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, 800, 600);

            ctx.fillStyle = '#fff';
            for (let i = 0; i < 160; i++) {
                const x = (i * 29) % 800;
                const y = (i * 19 + Date.now() / 90) % 600;
                ctx.fillRect(x, y, 1.5, 1.5);
            }

            // Ship
            ctx.save();
            ctx.translate(ship.x + 26, ship.y + 18);
            ctx.fillStyle = '#888'; ctx.beginPath(); ctx.moveTo(-22,-18); ctx.lineTo(-8,0); ctx.lineTo(-22,18); ctx.fill();
            ctx.fillStyle = '#cccccc'; ctx.fillRect(-24, -10, 48, 20);
            ctx.fillStyle = '#66ddff'; ctx.fillRect(8, -8, 14, 16);
            if (keys['Space'] || keys['KeyX'] || keys['KeyZ'] || keys['KeyQ']) {
                ctx.fillStyle = '#ff4400'; ctx.fillRect(-32, -7, 12, 14);
                ctx.fillStyle = '#ffff00'; ctx.fillRect(-36, -4, 8, 8);
            }
            ctx.restore();

            // Asteroids
            ctx.strokeStyle = '#555'; ctx.lineWidth = 5;
            for (let a of asteroids) {
                ctx.save();
                ctx.translate(a.x + a.size/2, a.y + a.size/2);
                ctx.rotate(a.angle);
                ctx.fillStyle = '#777';
                ctx.beginPath(); ctx.arc(0, 0, a.size/2, 0, Math.PI*2); ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 45;
                ctx.fillRect(p.x, p.y, 6, 6);
            }
            ctx.globalAlpha = 1;

            for (let c of confetti) {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(c.rotation * Math.PI / 180);
                ctx.fillStyle = c.color;
                ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size);
                ctx.restore();
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('mobile-controls').style.display = /Mobi|Android/i.test(navigator.userAgent) ? 'grid' : 'none';
            resetGame();
            gameRunning = true;
        }

        function endGame() {
            gameRunning = false;
            if (score > highScore) highScore = score;
            localStorage.setItem('starshipHigh', highScore);
            document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');

            document.getElementById('game-result').textContent = "MISSION FAILED";
            document.getElementById('game-result').style.color = "#ff4444";
            document.getElementById('final-score').innerHTML = `SCORE: ${score}<br>HIGH: ${highScore}`;
            document.getElementById('game-over-screen').style.display = 'flex';
            playSound(80, 800, 'sawtooth', 0.5);
            stopThrustSound();
        }

        function winGame() {
            gameRunning = false;
            if (score > highScore) highScore = score;
            localStorage.setItem('starshipHigh', highScore);
            document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');

            createConfetti();
            
            const rank = getPirateRank(score);

            document.getElementById('game-result').innerHTML = "🎉 MARS REACHED! 🏆";
            document.getElementById('game-result').style.color = "#00ff88";
            document.getElementById('final-score').innerHTML = `
                TO THE MOON, MARS AND BEYOND!<br><br>
                ${rank}<br><br>
                FINAL SCORE: ${score}<br>
                HIGH SCORE: ${highScore}
            `;
            document.getElementById('game-over-screen').style.display = 'flex';

            // Victory sounds
            playSound(400, 150); playSound(600, 200); playSound(800, 250);
            setTimeout(() => playSound(1000, 400), 300);
            setTimeout(() => playSound(1200, 600), 600);
        }

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        ['x','z','space','q'].forEach(k => {
            const btn = document.getElementById('btn-' + k);
            if (btn) {
                btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k === 'space' ? 'Space' : 'Key' + k.toUpperCase()] = true; });
                btn.addEventListener('touchend', e => { e.preventDefault(); keys[k === 'space' ? 'Space' : 'Key' + k.toUpperCase()] = false; });
            }
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        });

        gameLoop();
    </script>
</body>
</html>
