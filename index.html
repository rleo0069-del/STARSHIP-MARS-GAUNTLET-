<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Starship: Mars Gauntlet</title>
    <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/rocket_1f680.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            margin:0; padding:0; background:#000011; display:flex; justify-content:center; align-items:center; 
            min-height:100vh; font-family: 'Press Start 2P', cursive; color:white; overflow:hidden;
            touch-action: none;
        }
        #container {
            position: relative;
            width: 800px;
            max-width: 100%;
            box-shadow: 0 0 60px #ff0000;
        }
        canvas { 
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            border: 6px solid #ff4400;
            touch-action: none;
        }
        button { 
            background:rgba(255,60,0,0.9); color:white; border:3px solid #ff8800; 
            font-family:'Press Start 2P'; padding:12px 20px; font-size:16px; cursor:pointer;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div style="position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; font-size:18px; text-shadow:0 0 10px black; z-index:10;">
            <div>TIME: <span id="timer">1:00</span></div>
            <div>SCORE: <span id="score">00000</span></div>
            <div>HIGH: <span id="highscore">00000</span></div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,20,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:20;">
            <h1 style="font-size:48px; color:#FF0000; margin:0;">STARSHIP</h1>
            <h1 style="font-size:38px; color:#ffaa00; margin:-10px 0 30px;">MARS GAUNTLET</h1>
            <button id="start-btn" style="padding:20px 70px; font-size:26px; background:#cc0000; box-shadow:0 0 25px #ff0000;">DARE TO LAUNCH</button>
            <div style="margin-top:30px; font-size:14px;">X ↑ Z ↓ SPACE → Q ←<br>Survive <strong>60 seconds</strong></div>
            <div style="margin-top:15px; font-size:13px; color:#ffcc00;">BEST IN LANDSCAPE FOR MOBILE</div>
            <div style="position:absolute; bottom:25px; font-size:12px; color:#666;">© L.E.O GAMES 2026</div>
        </div>

        <!-- Game Over -->
        <div id="game-over-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(20,0,0,0.97); display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center; z-index:20;">
            <h1 id="game-result" style="font-size:52px; margin:10px 0 20px;"></h1>
            <p id="final-score" style="font-size:24px; line-height:1.8;"></p>
            <button id="restart-btn" style="padding:18px 60px; font-size:22px; background:#cc0000; box-shadow:0 0 20px #ff0000;">DARE TO LAUNCH AGAIN</button>
        </div>

        <!-- Pause -->
        <div id="pause-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,30,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:20;">
            <h1 style="color:#ffaa00; font-size:48px;">HOLD</h1>
            <button id="resume-btn" style="margin-top:30px; padding:15px 50px; font-size:20px;">DARE TO TRY AGAIN</button>
        </div>

        <!-- Touch Controls - ONLY on Mobile -->
        <div id="touch-controls" style="position:absolute; bottom:80px; left:0; right:0; display:none; justify-content:space-between; padding:0 20px; pointer-events:none; z-index:30;">
            <div style="pointer-events:auto; display:flex; gap:15px;">
                <button id="left-btn" style="width:70px;height:70px;font-size:32px;background:rgba(0,0,0,0.6);border:3px solid #ff8800;">←</button>
                <button id="right-btn" style="width:70px;height:70px;font-size:32px;background:rgba(0,0,0,0.6);border:3px solid #ff8800;">→</button>
            </div>
            <button id="thrust-btn" style="width:140px;height:90px;font-size:22px;background:#00ccff;color:black;pointer-events:auto;border:4px solid #ffff00;">BOOST ↑</button>
            <div></div>
        </div>

        <!-- Bottom buttons -->
        <div style="position:absolute; bottom:15px; right:15px; display:flex; gap:8px; z-index:30;">
            <button id="fullscreen-btn" style="display:none; padding:10px 16px; font-size:14px;">FULL SCREEN</button>
            <button id="mute-btn">🔊</button>
            <button id="pause-btn">⏸</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let ship = { x: 150, y: 300, width: 52, height: 36 };
        let asteroids = [], particles = [], confetti = [];
        let score = 0, highScore = localStorage.getItem('starshipHigh') || 0;
        let timeLeft = 60, gameRunning = false, paused = false, muted = false;
        let keys = {}, lastSpawn = 0, difficulty = 1, isWin = false, shieldActive = false, shieldTime = 0;

        document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgMusic = null;

        // ... [All the sound, reset, spawn, explosion, confetti, update, draw functions are the same as before] ...
        function playSound(freq, duration, type = 'sawtooth', vol = 0.3) {
            if (muted) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.value = vol;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); setTimeout(() => osc.stop(), duration);
            } catch(e) {}
        }

        function startBackgroundMusic() {
            if (muted || bgMusic) return;
            bgMusic = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            bgMusic.type = 'sine'; bgMusic.frequency.setValueAtTime(80, audioCtx.currentTime);
            gain.gain.value = 0.08;
            bgMusic.connect(gain).connect(audioCtx.destination);
            bgMusic.start();
        }

        function stopBackgroundMusic() { if (bgMusic) { bgMusic.stop(); bgMusic = null; } }

        function getPirateRank(score) {
            if (score > 2800) return "LEGENDARY SPACE PIRATE 🏴‍☠️👑";
            if (score > 2200) return "MARS MARAUDER 🏴‍☠️🔥";
            if (score > 1600) return "SPACE BUCCANEER 🏴‍☠️";
            if (score > 1000) return "VOID RAIDER 🏴‍☠️";
            return "ROOKIE SPACE PIRATE 🏴‍☠️";
        }

        function resetGame() {
            ship.x = 150; ship.y = 300; asteroids = []; particles = []; confetti = [];
            score = 0; timeLeft = 60; difficulty = 1; isWin = false; shieldActive = false;
            lastSpawn = Date.now();
        }

        function spawnAsteroid() {
            const type = Math.random();
            let size = type < 0.4 ? 55 : type < 0.7 ? 22 : 38;
            let speed = type < 0.4 ? 2.2 : type < 0.7 ? 5.5 : 3.8;
            asteroids.push({ x: 850, y: Math.random() * 500 + 50, size, speed: speed * difficulty, spin: (Math.random() - 0.5) * 0.15, angle: 0 });
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 40; i++) particles.push({ x, y, vx: (Math.random()-0.5)*13, vy: (Math.random()-0.5)*13, life: 50, color: Math.random()>0.5?'#ff8800':'#ffff00' });
            playSound(120, 600, 'sawtooth', 0.6);
        }

        function createConfetti() {
            for (let i = 0; i < 220; i++) {
                confetti.push({ x: Math.random()*800, y: Math.random()*-300, vx: (Math.random()-0.5)*9, vy: Math.random()*7+4,
                    size: Math.random()*10+6, color: ['#ff0000','#00ff00','#ffff00','#00ffff','#ff00ff'][Math.floor(Math.random()*5)],
                    rotation: Math.random()*360, rotSpeed: (Math.random()-0.5)*15 });
            }
        }

        function updateTouchControls() {
            const tc = document.getElementById('touch-controls');
            tc.style.display = (isMobile && gameRunning && !paused) ? 'flex' : 'none';
        }

        function update() {
            if (!gameRunning || paused) return;
            const speed = 4.8;
            if (keys['KeyX']) ship.y -= speed;
            if (keys['KeyZ']) ship.y += speed;
            if (keys['Space']) ship.x += speed;
            if (keys['KeyQ']) ship.x -= speed;

            ship.x = Math.max(20, Math.min(680, ship.x));
            ship.y = Math.max(40, Math.min(560, ship.y));

            if (Date.now() - lastSpawn > (620 / difficulty)) {
                spawnAsteroid(); if (Math.random() < 0.45) spawnAsteroid(); lastSpawn = Date.now();
            }

            for (let i = asteroids.length-1; i >= 0; i--) {
                const a = asteroids[i]; a.x -= a.speed; a.angle += a.spin || 0;
                if (!shieldActive && a.x < ship.x + ship.width && a.x + a.size > ship.x && a.y < ship.y + ship.height && a.y + a.size > ship.y) {
                    createExplosion(ship.x + 25, ship.y + 18); endGame(); return;
                }
                if (a.x < -80) asteroids.splice(i,1);
            }

            for (let i = particles.length-1; i >= 0; i--) { 
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--; p.vx*=0.96; p.vy*=0.96; if (p.life <= 0) particles.splice(i,1); 
            }
            for (let i = confetti.length-1; i >= 0; i--) { 
                const c = confetti[i]; c.x += c.vx; c.y += c.vy; c.rotation += c.rotSpeed; c.vy += 0.18; if (c.y > 650) confetti.splice(i,1); 
            }

            if (shieldActive) shieldTime--; if (shieldTime <= 0) shieldActive = false;
            timeLeft -= 1/60; difficulty = 1 + (60 - timeLeft)/50;
            if (timeLeft <= 0 && !isWin) { isWin = true; winGame(); return; }

            score = Math.floor((60 - timeLeft) * 58);
            document.getElementById('timer').textContent = Math.ceil(timeLeft) + 's';
            document.getElementById('score').textContent = score.toString().padStart(5, '0');
        }

        function draw() {
            ctx.fillStyle = '#000011'; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 160; i++) {
                const x = (i*29)%800, y = (i*19 + Date.now()/90)%600;
                ctx.fillRect(x, y, 1.5, 1.5);
            }

            ctx.save(); ctx.translate(ship.x+26, ship.y+18);
            ctx.fillStyle = '#aaaaaa'; 
            ctx.beginPath(); ctx.moveTo(-24,-18); ctx.lineTo(-8,0); ctx.lineTo(-24,18); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-24,-18); ctx.lineTo(12,0); ctx.lineTo(-24,18); ctx.fill();
            ctx.fillStyle = '#eeeeee'; ctx.fillRect(-24,-10,52,22);
            ctx.fillStyle = shieldActive ? '#00ffff' : '#44ddff'; ctx.fillRect(12,-8,16,17);
            if (keys['Space'] || keys['KeyX'] || keys['KeyZ'] || keys['KeyQ']) {
                ctx.fillStyle = '#ff2200'; ctx.fillRect(-36,-8,16,18);
                ctx.fillStyle = '#ffff44'; ctx.fillRect(-40,-5,10,12);
            }
            ctx.restore();

            ctx.strokeStyle = '#555'; ctx.lineWidth = 5;
            for (let a of asteroids) {
                ctx.save(); ctx.translate(a.x + a.size/2, a.y + a.size/2); ctx.rotate(a.angle);
                ctx.fillStyle = '#777'; ctx.beginPath(); ctx.arc(0,0,a.size/2,0,Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.restore();
            }

            for (let p of particles) { ctx.fillStyle = p.color; ctx.globalAlpha = p.life/50; ctx.fillRect(p.x,p.y,7,7); }
            ctx.globalAlpha = 1;

            for (let c of confetti) {
                ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rotation*Math.PI/180);
                ctx.fillStyle = c.color; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size); ctx.restore();
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('pause-screen').style.display = 'none';
            resetGame();
            gameRunning = true; paused = false;
            updateTouchControls();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startBackgroundMusic();
        }

        function endGame() {
            gameRunning = false; stopBackgroundMusic();
            if (score > highScore) highScore = score;
            localStorage.setItem('starshipHigh', highScore);
            document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');
            document.getElementById('game-result').textContent = "MISSION FAILED"; 
            document.getElementById('game-result').style.color = "#ff4444";
            document.getElementById('final-score').innerHTML = `SCORE: ${score}<br>HIGH: ${highScore}`;
            document.getElementById('game-over-screen').style.display = 'flex';
            updateTouchControls();
        }

        function winGame() {
            gameRunning = false; stopBackgroundMusic();
            if (score > highScore) highScore = score; 
            localStorage.setItem('starshipHigh', highScore);
            document.getElementById('highscore').textContent = highScore.toString().padStart(5, '0');
            createConfetti();
            const rank = getPirateRank(score);
            document.getElementById('game-result').innerHTML = "🎉 MARS REACHED! 🏆"; 
            document.getElementById('game-result').style.color = "#00ff88";
            document.getElementById('final-score').innerHTML = `TO THE MOON, MARS AND BEYOND!<br><br>${rank}<br><br>FINAL SCORE: ${score}<br>HIGH SCORE: ${highScore}`;
            document.getElementById('game-over-screen').style.display = 'flex';
            updateTouchControls();
        }

        function togglePause() {
            if (!gameRunning) return;
            paused = !paused;
            document.getElementById('pause-screen').style.display = paused ? 'flex' : 'none';
            updateTouchControls();
        }

        // Keyboard
        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') e.preventDefault(); if (e.code === 'KeyP') togglePause(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Buttons
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('resume-btn').addEventListener('click', () => { paused = false; document.getElementById('pause-screen').style.display = 'none'; updateTouchControls(); });
        document.getElementById('pause-btn').addEventListener('click', togglePause);
        document.getElementById('mute-btn').addEventListener('click', () => {
            muted = !muted; document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
            if (muted) stopBackgroundMusic(); else if (gameRunning) startBackgroundMusic();
        });

        // Mobile detection
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            document.getElementById('fullscreen-btn').style.display = 'block';

            const leftBtn = document.getElementById('left-btn');
            const rightBtn = document.getElementById('right-btn');
            const thrustBtn = document.getElementById('thrust-btn');

            leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['KeyQ'] = true; });
            leftBtn.addEventListener('touchend', () => keys['KeyQ'] = false);
            rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['Space'] = true; });
            rightBtn.addEventListener('touchend', () => keys['Space'] = false);
            thrustBtn.addEventListener('touchstart', e => { e.preventDefault(); keys['KeyX'] = true; });
            thrustBtn.addEventListener('touchend', () => keys['KeyX'] = false);

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                if (gameRunning && !paused) {
                    keys['KeyX'] = true;
                    setTimeout(() => keys['KeyX'] = false, 120);
                }
            });
        }

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        });

        document.body.addEventListener('touchstart', () => { 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
        }, { once: true });

        gameLoop();
        console.log('%cStarship Mars Gauntlet - Clean Desktop + Mobile!', 'color:#00ff88; font-size:16px');
    </script>
</body>
</html>
