<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starship: Mars Gauntlet</title>
    <link rel="icon" href="https://em-content.zobj.net/source/twitter/376/rose_1f339.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin:0; background:#000011; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family: 'Press Start 2P', cursive; color:white; }
        canvas { border: 4px solid #990000; box-shadow: 0 0 40px #CC0000; }
    </style>
</head>
<body>
    <div style="position:relative;">
        <canvas id="game" width="800" height="600"></canvas>
        
        <div style="position:absolute; top:15px; left:20px; right:20px; display:flex; justify-content:space-between; font-size:17px; pointer-events:none;">
            <div>TIME: <span id="timer">4:20</span></div>
            <div>SCORE: <span id="score">00000</span></div>
        </div>
        
        <div id="start-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,20,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
            <h1 style="font-size:42px; color:#FF0000;">STARSHIP</h1>
            <h1 style="font-size:36px; color:#ffaa00; margin-top:-10px;">MARS GAUNTLET</h1>
            <button id="start-btn" style="margin-top:40px; padding:16px 55px; font-size:22px; background:#cc0000; color:white; border:none; cursor:pointer;">LAUNCH MISSION</button>
            <div style="margin-top:30px; font-size:13px;">
                ← → or A D : Move Left/Right<br>
                SPACE : Boost Up<br><br>
                Survive 4 minutes 20 seconds
            </div>
            <div style="position:absolute; bottom:20px; font-size:11px; color:#666666;">
                © L.E.O GAMES 2026
            </div>
        </div>
        
        <div id="game-over-screen" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(40,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
            <h1 style="font-size:42px; color:#ff4444;">MISSION FAILED</h1>
            <p id="final-score" style="font-size:22px; margin:15px 0;"></p>
            <button id="restart-btn" style="padding:15px 50px; font-size:20px; background:#aa0000; color:white; border:none; cursor:pointer;">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let ship = { x: 150, y: 300, vy: 0 };
        let asteroids = [];
        let score = 0;
        let timeLeft = 260;
        let gameRunning = false;
        let keys = {};
        let lastSpawn = 0;
        
        function resetGame() {
            ship = { x: 150, y: 300, vy: 0 };
            asteroids = [];
            score = 0;
            timeLeft = 260;
            lastSpawn = Date.now();
        }
        
        function spawnAsteroid() {
            asteroids.push({
                x: 850,
                y: Math.random() * 550,
                size: Math.random() * 38 + 22,
                speed: 2.8 + Math.random() * 1.5
            });
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Vertical movement (boost)
            ship.vy += 0.28;                    // gravity
            if (keys[' '] || keys['Spacebar']) ship.vy -= 0.78;   // BOOST
            ship.y += ship.vy;
            ship.y = Math.max(30, Math.min(570, ship.y));
            
            // Horizontal movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= 5;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += 5;
            ship.x = Math.max(20, Math.min(720, ship.x));
            
            // Spawn asteroids
            if (Date.now() - lastSpawn > 650) {
                spawnAsteroid();
                lastSpawn = Date.now();
            }
            
            // Move asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const a = asteroids[i];
                a.x -= a.speed;
                
                if (a.x < ship.x + 50 && a.x + a.size > ship.x &&
                    a.y < ship.y + 20 && a.y + a.size > ship.y - 20) {
                    endGame();
                    return;
                }
                if (a.x < -50) asteroids.splice(i, 1);
            }
            
            timeLeft -= 1/60;
            if (timeLeft <= 0) { winGame(); return; }
            
            score = Math.floor((260 - timeLeft) * 35);
            
            document.getElementById('timer').textContent = Math.ceil(timeLeft) + 's';
            document.getElementById('score').textContent = score.toString().padStart(5, '0');
        }
        
        function draw() {
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, 800, 600);
            
            // Stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 80; i++) {
                ctx.fillRect((i * 47) % 800, (i * 31) % 600, 2, 2);
            }
            
            // Ship
            ctx.fillStyle = '#cccccc';
            ctx.fillRect(ship.x, ship.y - 12, 50, 24);
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(ship.x - 8, ship.y - 6, 12, 12);
            
            // Asteroids
            ctx.fillStyle = '#555555';
            for (let a of asteroids) {
                ctx.beginPath();
                ctx.arc(a.x + a.size/2, a.y + a.size/2, a.size/2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            resetGame();
            gameRunning = true;
            gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('final-score').innerHTML = `FINAL SCORE: ${score}<br>You didn't make it...`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
        
        function winGame() {
            gameRunning = false;
            document.getElementById('final-score').innerHTML = `🎉 YOU REACHED MARS! 🎉<br>FINAL SCORE: ${score}`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }
        
        // FIXED KEYBOARD CONTROLS
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ') e.preventDefault();
        });
        
        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-screen').style.display = 'none';
            startGame();
        });
        
        console.log('%cStarship Mars Gauntlet - Controls fixed!', 'color:#ff0000');
    </script>
</body>
</html>
